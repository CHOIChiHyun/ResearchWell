<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 로그인 - Research Well</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../src/assets/style.css">
    <link rel="stylesheet" href="../src/assets/admin.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <img src="/images/logo.png" alt="Research Well">
                <h1>관리자 로그인</h1>
                <p>언론 공표 자료 관리 시스템</p>
            </div>

            <div id="login-error" class="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-group" style="margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.9rem; color: var(--text-color);">
                        <input type="checkbox" id="save-email" style="width: 18px; height: 18px; cursor: pointer;">
                        이메일 저장
                    </label>
                </div>

                <button type="submit" id="login-btn" class="btn-login">로그인</button>
            </form>
        </div>
    </div>

    <script type="module" src="../src/pages/admin/login.js"></script>
</body>

</html>
