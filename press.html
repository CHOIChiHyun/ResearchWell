<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>언론 공표 - Research Well</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* Press Page Specific Styles */
        .press-section {
            padding-top: 50px;
        }

        .press-filters {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 24px;
            border: 2px solid #e5e7eb;
            border-radius: 50px;
            background: white;
            color: var(--text-color);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .filter-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .press-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .press-card {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 400px;
            overflow: hidden;
        }

        .press-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .press-card-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            width: fit-content;
        }

        .press-card-tag.poll {
            background: rgba(15, 69, 113, 0.1);
            color: var(--primary-color);
        }

        .press-card-tag.press {
            background: rgba(217, 35, 42, 0.1);
            color: var(--accent-color);
        }

        .press-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
            color: var(--text-heading);
            line-height: 1.4;
        }

        .press-card p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 20px;
            line-height: 1.6;
            flex-grow: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
        }

        .press-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #f0f0f0;
            padding-top: 20px;
            margin-top: auto;
        }

        .press-card-date {
            font-size: 13px;
            color: var(--text-light);
        }

        .press-card-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .press-card-link:hover {
            background: var(--primary-light);
        }

        .press-card-link svg {
            width: 16px;
            height: 16px;
        }

        .press-empty {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-light);
        }

        .press-empty svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .press-empty h3 {
            font-size: 1.25rem;
            color: var(--text-heading);
            margin-bottom: 8px;
        }

        .press-loading {
            display: flex;
            justify-content: center;
            padding: 60px;
        }

        .press-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f0f0f0;
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 1200px) {
            .press-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .press-grid {
                grid-template-columns: 1fr;
            }

            .press-filters {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="header-root"></div>

        <main>
            <section class="section press-section">
                <div class="container">
                    <div class="section-header text-center">
                        <h2 class="section-title">Press</h2>
                        <p class="section-subtitle">Research Well의 언론 공표 자료를 확인하실 수 있습니다.</p>
                    </div>

                    <!-- Filters -->
                    <div class="press-filters" id="filters">
                        <button class="filter-btn active" data-category="all">전체</button>
                        <button class="filter-btn" data-category="보도자료">보도자료</button>
                    </div>

                    <!-- Loading -->
                    <div id="loading" class="press-loading">
                        <div class="spinner"></div>
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="press-empty" style="display: none;">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        <h3>등록된 자료가 없습니다</h3>
                        <p>아직 공개된 언론 공표 자료가 없습니다.</p>
                    </div>

                    <!-- Press Grid -->
                    <div id="press-grid" class="press-grid" style="display: none;"></div>
                </div>
            </section>
        </main>

        <div id="footer-root"></div>
    </div>

    <script type="module" src="./src/main.js"></script>
    <script type="module" src="./src/pages/press-list.js"></script>
</body>

</html>
